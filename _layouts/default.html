<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
  </head>
  <body>
    <div class="wrapper">
      <header>
        
        <!-- Updated image tag with a professional circle border -->
        <img src="{{ '/DP.png' | relative_url }}" width="140" height="140" style="display: block; margin-bottom: 20px; border-radius: 50%; border: 3px solid #1e6bb8; object-fit: cover;">

        <h1><a href="{{ '/' | absolute_url }}">{{ site.title }}</a></h1>
        
        <p>{{ site.description }}</p>

        <p class="view"><a href="{{ site.github.owner_url }}">View My GitHub Profile</a></p>
      </header>
      
      <section>
        {{ content }}
      </section>
      
      <footer>
        <p><small>Hosted on GitHub Pages &mdash; Theme by orderedlist</small></p>
      </footer>
    </div>
  </body>
</html>
